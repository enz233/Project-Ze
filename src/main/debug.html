<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Debug - Quiet Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 顶栏 */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }
    .toolbar button {
      padding: 3px 10px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #333;
      color: #ccc;
      font-size: 11px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #444; }
    .toolbar button.active { background: #0e639c; border-color: #0e639c; color: #fff; }
    .toolbar .spacer { flex: 1; }
    .toolbar .count { color: #888; font-size: 11px; }

    /* 记忆状态 */
    .memory-panel {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      padding: 8px 12px;
      background: #202020;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }
    .memory-card {
      min-height: 58px;
      padding: 7px 8px;
      border: 1px solid #3a3a3a;
      border-radius: 5px;
      background: #252526;
      overflow: hidden;
    }
    .memory-title {
      margin-bottom: 4px;
      color: #9cdcfe;
      font-size: 11px;
      font-weight: 700;
    }
    .memory-value {
      color: #d4d4d4;
      font-size: 11px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .memory-muted { color: #777; }

    /* 分类筛选 */
    .filters {
      display: flex;
      gap: 4px;
      padding: 4px 12px;
      background: #2d2d2d;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 2px 8px;
      border: 1px solid #444;
      border-radius: 3px;
      background: transparent;
      color: #888;
      font-size: 11px;
      cursor: pointer;
    }
    .filter-btn.active { color: #fff; border-color: #888; }
    .filter-btn[data-cat="state"] { border-color: #4ec9b0; }
    .filter-btn[data-cat="state"].active { background: #4ec9b0; color: #000; }
    .filter-btn[data-cat="drag"] { border-color: #dcdcaa; }
    .filter-btn[data-cat="drag"].active { background: #dcdcaa; color: #000; }
    .filter-btn[data-cat="tts"] { border-color: #9cdcfe; }
    .filter-btn[data-cat="tts"].active { background: #9cdcfe; color: #000; }
    .filter-btn[data-cat="observer"] { border-color: #ce9178; }
    .filter-btn[data-cat="observer"].active { background: #ce9178; color: #000; }
    .filter-btn[data-cat="chat"] { border-color: #c586c0; }
    .filter-btn[data-cat="chat"].active { background: #c586c0; color: #000; }
    .filter-btn[data-cat="ai"] { border-color: #b5cea8; }
    .filter-btn[data-cat="ai"].active { background: #b5cea8; color: #000; }
    .filter-btn[data-cat="error"] { border-color: #f44747; }
    .filter-btn[data-cat="error"].active { background: #f44747; color: #fff; }

    /* 日志区域 */
    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .log-line {
      padding: 1px 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }
    .log-line:hover { background: #2a2d2e; }
    .log-time { color: #6a9955; margin-right: 8px; }
    .log-cat {
      display: inline-block;
      min-width: 70px;
      margin-right: 8px;
      padding: 0 4px;
      border-radius: 2px;
      text-align: center;
      font-weight: 600;
    }
    .log-cat.state { color: #4ec9b0; }
    .log-cat.drag { color: #dcdcaa; }
    .log-cat.tts { color: #9cdcfe; }
    .log-cat.observer { color: #ce9178; }
    .log-cat.chat { color: #c586c0; }
    .log-cat.ai { color: #b5cea8; }
    .log-cat.error { color: #f44747; }
    .log-msg { color: #d4d4d4; }
    .log-line.error .log-msg { color: #f44747; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="clearBtn">Clear</button>
    <button id="pauseBtn">Pause</button>
    <button id="refreshMemoryBtn">Refresh Memory</button>
    <div class="spacer"></div>
    <span class="count" id="countDisplay">0 logs</span>
  </div>
  <div class="memory-panel">
    <div class="memory-card">
      <div class="memory-title">Relationship</div>
      <div class="memory-value" id="relationshipView">Loading...</div>
    </div>
    <div class="memory-card">
      <div class="memory-title">Interactions</div>
      <div class="memory-value" id="interactionView">Loading...</div>
    </div>
    <div class="memory-card">
      <div class="memory-title">Top Apps</div>
      <div class="memory-value" id="appsView">Loading...</div>
    </div>
    <div class="memory-card">
      <div class="memory-title">Life Pattern</div>
      <div class="memory-value" id="lifePatternView">Loading...</div>
    </div>
    <div class="memory-card">
      <div class="memory-title">Proactive Decision</div>
      <div class="memory-value" id="proactiveView">Loading...</div>
    </div>
    <div class="memory-card">
      <div class="memory-title">Micro Behavior</div>
      <div class="memory-value" id="microBehaviorView">Loading...</div>
    </div>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn active" data-cat="state">State</button>
    <button class="filter-btn active" data-cat="drag">Drag</button>
    <button class="filter-btn active" data-cat="tts">TTS</button>
    <button class="filter-btn active" data-cat="observer">Observer</button>
    <button class="filter-btn active" data-cat="chat">Chat</button>
    <button class="filter-btn active" data-cat="ai">AI</button>
    <button class="filter-btn active" data-cat="error">Error</button>
  </div>
  <div class="log-container" id="logContainer"></div>

  <script>
    var logContainer = document.getElementById('logContainer');
    var countDisplay = document.getElementById('countDisplay');
    var pauseBtn = document.getElementById('pauseBtn');
    var clearBtn = document.getElementById('clearBtn');
    var refreshMemoryBtn = document.getElementById('refreshMemoryBtn');
    var relationshipView = document.getElementById('relationshipView');
    var interactionView = document.getElementById('interactionView');
    var appsView = document.getElementById('appsView');
    var lifePatternView = document.getElementById('lifePatternView');
    var proactiveView = document.getElementById('proactiveView');
    var microBehaviorView = document.getElementById('microBehaviorView');
    var paused = false;
    var logCount = 0;
    var activeFilters = new Set(['state', 'drag', 'tts', 'observer', 'chat', 'ai', 'error']);

    // 分类筛选
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cat = this.dataset.cat;
        if (cat === 'all') {
          var allActive = document.querySelectorAll('.filter-btn[data-cat]:not([data-cat="all"])');
          var anyInactive = false;
          allActive.forEach(function(b) { if (!b.classList.contains('active')) anyInactive = true; });
          allActive.forEach(function(b) {
            if (anyInactive) b.classList.add('active');
            else b.classList.remove('active');
          });
          activeFilters = anyInactive
            ? new Set(['state', 'drag', 'tts', 'observer', 'chat', 'ai', 'error'])
            : new Set();
        } else {
          this.classList.toggle('active');
          if (this.classList.contains('active')) activeFilters.add(cat);
          else activeFilters.delete(cat);
        }
        applyFilters();
      });
    });

    function applyFilters() {
      document.querySelectorAll('.log-line').forEach(function(line) {
        var cat = line.dataset.cat;
        line.style.display = activeFilters.has(cat) ? '' : 'none';
      });
    }

    // 暂停/继续
    pauseBtn.addEventListener('click', function() {
      paused = !paused;
      this.textContent = paused ? 'Resume' : 'Pause';
      this.classList.toggle('active', paused);
    });

    // 清空
    clearBtn.addEventListener('click', function() {
      logContainer.innerHTML = '';
      logCount = 0;
      countDisplay.textContent = '0 logs';
    });

    if (refreshMemoryBtn) {
      refreshMemoryBtn.addEventListener('click', refreshMemoryPanel);
    }

    function fmtNum(value) {
      return Math.round(Number(value || 0));
    }

    function formatInteractionStats(stats) {
      if (!stats || Object.keys(stats).length === 0) return 'No interactions yet';
      return Object.keys(stats)
        .sort(function(a, b) { return (stats[b].count || 0) - (stats[a].count || 0); })
        .slice(0, 5)
        .map(function(key) { return key + ': ' + (stats[key].count || 0); })
        .join('\n');
    }

    function formatTopApps(appUsage) {
      if (!appUsage || Object.keys(appUsage).length === 0) return 'No app usage yet';
      return Object.keys(appUsage)
        .sort(function(a, b) { return (appUsage[b].count || 0) - (appUsage[a].count || 0); })
        .slice(0, 5)
        .map(function(name) { return name + ': ' + (appUsage[name].count || 0); })
        .join('\n');
    }

    function formatTimeAgo(timestamp) {
      if (!timestamp) return 'never';
      var seconds = Math.max(0, Math.round((Date.now() - timestamp) / 1000));
      if (seconds < 60) return seconds + 's ago';
      var minutes = Math.round(seconds / 60);
      if (minutes < 60) return minutes + 'm ago';
      return Math.round(minutes / 60) + 'h ago';
    }

    function formatProactive(proactive) {
      if (!proactive) return 'No proactive state yet';
      var direct = proactive.lastDirectInteraction
        ? proactive.lastDirectInteraction.type + ' ' + formatTimeAgo(proactive.lastDirectInteraction.timestamp)
        : 'none';
      var focus = proactive.firedFocusThresholds && proactive.firedFocusThresholds.length
        ? proactive.firedFocusThresholds.join(',') + 's'
        : '-';
      return [
        'cat: ' + (proactive.previousCategory || '-') + ' → ' + (proactive.category || '-'),
        'decision: ' + (proactive.lastDecision || 'none'),
        'candidate: ' + (proactive.lastCandidateReason || '-'),
        'suppress: ' + (proactive.lastSuppressReason || '-'),
        'budget: ' + fmtNum(proactive.rollingCount) + ' rolling / ' + fmtNum(proactive.dailyDelivered) + ' day',
        'last: ' + (proactive.lastDeliveredMessage || '-') + ' (' + formatTimeAgo(proactive.lastDeliveredAt) + ')',
        'direct: ' + direct,
        'focus: ' + (proactive.focusSessionKey || '-') + ' / ' + focus
      ].join('\n');
    }

    function formatMicroBehavior(microBehavior) {
      if (!microBehavior) return 'No micro behavior yet';
      var decision = microBehavior.lastDecision || null;
      var result = microBehavior.lastResult || null;
      var recent = microBehavior.recentBehaviors || [];
      var lines = [
        'enabled: ' + (microBehavior.enabled ? 'yes' : 'no'),
        'behavior: ' + (decision ? decision.behavior : '-'),
        'reason: ' + (decision ? decision.reason : '-'),
        'bubble: ' + (decision ? String(decision.showBubble) : '-'),
        'delay: ' + (decision ? fmtNum(decision.bubbleDelayMs) + 'ms' : '-'),
        'source: ' + (decision ? decision.source : '-'),
        'performed: ' + (result ? String(result.performed) : '-')
      ];
      if (recent.length) {
        lines.push('recent:');
        recent.slice(0, 3).forEach(function(item) {
          lines.push('- ' + item.reason + ' → ' + item.behavior + ' / bubble=' + item.showBubble + ' / ok=' + item.success);
        });
      }
      return lines.join('\n');
    }

    function refreshMemoryPanel() {
      // @ts-ignore
      if (!window.companion || !window.companion.getChatInfo) return;
      // @ts-ignore
      window.companion.getChatInfo().then(function(info) {
        var memory = info && info.memory ? info.memory : {};
        relationshipView.textContent = [
          'affection: ' + fmtNum(memory.affection) + '/100',
          'familiarity: ' + fmtNum(memory.familiarity) + '/100',
          'today: ' + fmtNum(memory.todayInteractions),
          'history: ' + fmtNum(info.historyCount)
        ].join('\n');
        interactionView.textContent = formatInteractionStats(memory.interactionStats);
        appsView.textContent = formatTopApps(memory.appUsage);
        lifePatternView.textContent = info.lifePattern || info.summary || 'No memory summary yet';
        proactiveView.textContent = formatProactive(info.proactive);
        microBehaviorView.textContent = formatMicroBehavior(info.microBehavior);
      }).catch(function(error) {
        var msg = 'Memory load failed: ' + (error && error.message ? error.message : String(error));
        relationshipView.textContent = msg;
        interactionView.textContent = msg;
        appsView.textContent = msg;
        lifePatternView.textContent = msg;
        proactiveView.textContent = msg;
        microBehaviorView.textContent = msg;
      });
    }

    refreshMemoryPanel();
    setInterval(refreshMemoryPanel, 10000);

    // 检查是否在底部附近（50px 以内）
    function isNearBottom() {
      return logContainer.scrollHeight - logContainer.scrollTop - logContainer.clientHeight < 50;
    }

    // 自动滚动到底部（只在用户已经在底部时）
    function scrollToBottom() {
      if (!paused && isNearBottom()) {
        logContainer.scrollTop = logContainer.scrollHeight;
      }
    }

    // 接收日志
    // @ts-ignore
    window.companion.onLog(function(data) {
      if (paused) return;

      var line = document.createElement('div');
      line.className = 'log-line' + (data.category === 'error' ? ' error' : '');
      line.dataset.cat = data.category;

      var time = document.createElement('span');
      time.className = 'log-time';
      time.textContent = data.time;

      var cat = document.createElement('span');
      cat.className = 'log-cat ' + data.category;
      cat.textContent = data.category.toUpperCase();

      var msg = document.createElement('span');
      msg.className = 'log-msg';
      msg.textContent = data.message;

      line.appendChild(time);
      line.appendChild(cat);
      line.appendChild(msg);
      logContainer.appendChild(line);

      logCount++;
      countDisplay.textContent = logCount + ' logs';

      // 限制最大行数
      if (logContainer.children.length > 500) {
        logContainer.removeChild(logContainer.children[0]);
      }

      scrollToBottom();
      applyFilters();
    });
  </script>
</body>
</html>
